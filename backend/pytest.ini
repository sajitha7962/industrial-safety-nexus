[pytest]
asyncio_mode = auto
testpaths = tests
addopts =
    --tb=short
    -v
    --cov=.
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=90
    --ignore=alembic

[coverage:run]
source = .
omit =
    tests/*
    alembic/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
