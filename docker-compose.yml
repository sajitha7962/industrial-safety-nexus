services:
  # ─────────────────────────────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-safety_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-safety_pass}
      POSTGRES_DB: ${POSTGRES_DB:-safety_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-safety_user} -d ${POSTGRES_DB:-safety_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infrastructure/mosquitto.conf:/mosquitto/config/mosquitto.conf

  # ─────────────────────────────────────────────────────────────
  # Backend — FastAPI  (build from project root so all packages
  # are available: ai_models/, rule_engine/, data/)
  # ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_started
    volumes:
      - ./ai_models/saved:/app/ai_models/saved
      - ./data:/app/data
      - ./reports:/app/reports
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://safety_user:safety_pass@postgres:5432/safety_db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - MQTT_BROKER=${MQTT_BROKER:-mosquitto}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-super-secret-key-change-me-in-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ─────────────────────────────────────────────────────────────
  # Celery Worker — async background tasks (same image as backend)
  # ─────────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: celery -A celery_app worker --loglevel=info --concurrency=2
    restart: unless-stopped
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./ai_models/saved:/app/ai_models/saved
      - ./data:/app/data
      - ./reports:/app/reports
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://safety_user:safety_pass@postgres:5432/safety_db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}

  # ─────────────────────────────────────────────────────────────
  # Data Simulator — publishes synthetic MQTT sensor streams
  # (build from project root so data/ package is accessible)
  # ─────────────────────────────────────────────────────────────
  simulator:
    build:
      context: .
      dockerfile: simulator/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      mosquitto:
        condition: service_started
      backend:
        condition: service_started
    environment:
      - MQTT_BROKER=${MQTT_BROKER:-mosquitto}
      - MQTT_PORT=${MQTT_PORT:-1883}

  # ─────────────────────────────────────────────────────────────
  # Frontend — React dashboard (Nginx)
  # ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
      - "3443:443"
    depends_on:
      - backend

  # ─────────────────────────────────────────────────────────────
  # Prometheus — Metrics scraping
  # ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'

  # ─────────────────────────────────────────────────────────────
  # Grafana — Metrics visualization
  # ─────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
